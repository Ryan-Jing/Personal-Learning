services:
  commonplace:
    container_name: commonplace
    build:
      context: .
    image: commonplace-learning-hub:local
    restart: unless-stopped
    init: true
    ports:
      # Loopback-only: LAN clients cannot bypass Tailscale Serve.
      - "127.0.0.1:${HOST_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
